version: '3.8'
services:
  mysqldb:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: voitureshop
    ports:
      - "3307:3306"
    networks:
      - voiture-net

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    networks:
      - voiture-net

  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      MYSQL_HOST: mysqldb
      MYSQL_PORT: 3306
      OLLAMA_HOST: ollama
      OLLAMA_PORT: 11434
    depends_on:
      - mysqldb
      - ollama
    networks:
      - voiture-net

networks:
  voiture-net:
    driver: bridge